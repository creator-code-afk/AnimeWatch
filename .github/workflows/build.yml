name: Build APK

# Сборка запускается автоматически при каждом push в main,
# а также можно запустить вручную кнопкой "Run workflow" на вкладке Actions
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Установка Android SDK
        uses: android-actions/setup-android@v3

      - name: Установка нужных пакетов Android SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Установка Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Сборка debug-APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Загрузка APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: AnimeWatch-debug-apk
          path: app/build/outputs/apk/debug/*.apk
